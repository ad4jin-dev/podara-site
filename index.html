<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PODARA</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

<!-- NAV -->
<header class="nav" id="navbar">

  <div class="logo">PODARA</div>

  <nav class="menu">
    <a href="#products">Products</a>
    <a href="#solutions">Solutions</a>
    <a href="#about">About</a>
  </nav>

  <a class="cta-btn desktop-cta" href="#contact">Get a Quote</a>

  <!-- 🔥 汉堡按钮（确保存在） -->
  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>

</header>

<!-- mobile menu -->
<div class="mobile-menu" id="mobileMenu">
  <a href="#products">Products</a>
  <a href="#solutions">Solutions</a>
  <a href="#about">About</a>
  <a href="#contact">Get a Quote</a>
</div>

<!-- HERO -->
<section class="hero">

  <!-- 🔥 视频（关键修复） -->
  <video class="hero-video"
         autoplay
         muted
         loop
         playsinline
         webkit-playsinline>
    <source src="./assets/hero.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="hero-content">
    <h1 class="hero-title">
      Welcome to the next era<br>
      of focused workspaces
    </h1>

    <p class="hero-subtitle">
      Smart acoustic pods & modern workplace solutions
    </p>

    <button class="primary">Explore PODARA S1</button>
  </div>

</section>

<!-- CONTENT（确保可滚动） -->
<section class="content">
  <div class="block" id="products"><h2>Products</h2></div>
  <div class="block" id="solutions"><h2>Solutions</h2></div>
  <div class="block" id="about"><h2>About</h2></div>
</section>

<script src="./script.js"></script>

</body>
</html>
